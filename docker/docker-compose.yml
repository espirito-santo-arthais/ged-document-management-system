version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: ged-postgres
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: ged-minio
    command: server /data --console-address ":9001"
    restart: always
    env_file:
      - ../.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ../backend
    container_name: ged-backend
    depends_on:
      - postgres
      - minio
    env_file:
      - ../.env
    ports:
      - "${SERVER_PORT}:8080"

  frontend:
    build:
      context: ../frontend
    container_name: ged-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:80"

volumes:
  postgres_data:
  minio_data: