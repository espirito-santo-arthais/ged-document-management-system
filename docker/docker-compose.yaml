name: ged-system

services:
  postgres:
    image: postgres:15
    container_name: ged-postgres
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ged-minio
    command: server /data --console-address ":9001"
    restart: always
    env_file:
      - ../.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    container_name: ged-minio-init
    depends_on:
      - minio
    env_file:
      - ../.env
    entrypoint: >
      /bin/sh -c "
      echo '⏳ Aguardando MinIO subir...';
      sleep 5;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb local/${MINIO_BUCKET} --ignore-existing;
      mc anonymous set public local/${MINIO_BUCKET};
      echo '✅ MinIO pronto!';
      exit 0;
      "

volumes:
  postgres_data:
    name: ged_postgres_data
  minio_data:
    name: ged_minio_data