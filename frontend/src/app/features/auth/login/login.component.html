<div class="login-page d-flex align-items-center justify-content-center">

  <div class="login-card card shadow border-0">

    <div class="card-body p-4">

      <div class="text-center mb-4">
        <h4 class="fw-bold mb-1">Acesso ao Sistema</h4>
        <small class="text-muted">Informe suas credenciais</small>
      </div>

      <form (ngSubmit)="onSubmit()">

        <!-- ERRO -->
        <div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-start gap-2">

          <i class="bi bi-exclamation-triangle-fill fs-5"></i>

          <div>
            <strong>Erro ao autenticar</strong>
            <div class="small">{{ errorMessage }}</div>
          </div>

          <button type="button" class="btn-close ms-auto" (click)="errorMessage=''"></button>

        </div>

        <!-- EMAIL -->
        <div class="mb-3">
          <label class="form-label small text-muted">E-mail</label>
          <input type="email" class="form-control form-control-lg" [(ngModel)]="username" name="username" required
            placeholder="seu@email.com" />
        </div>

        <!-- SENHA -->
        <div class="mb-3">
          <label class="form-label small text-muted">Senha</label>
          <input type="password" class="form-control form-control-lg" [(ngModel)]="password" name="password" required
            placeholder="••••••••" />
        </div>

        <!-- BOTÃO -->
        <button class="btn btn-dark w-100 btn-lg" type="submit" [disabled]="loadingService.isLoading()">

          <span *ngIf="loadingService.isLoading()" class="spinner-border spinner-border-sm me-2"></span>

          {{ loadingService.isLoading() ? 'Entrando...' : 'Entrar' }}
        </button>

      </form>

    </div>

  </div>

</div>
