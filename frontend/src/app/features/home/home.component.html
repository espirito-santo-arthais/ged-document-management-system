<div class="container mt-5">

  <h2>Documentos</h2>

  <button class="btn btn-danger mb-3" (click)="logout()">
    Sair
  </button>

  <ng-container *ngIf="documentsPage$ | async as page">

    <p>Total: {{ page.totalElements }}</p>

    <!-- Tabela -->
    <table class="table table-striped table-hover" *ngIf="page.content.length > 0">

      <thead class="table-dark">
        <tr>
          <th>Título</th>
          <th>Descrição</th>
          <th>Status</th>
          <th>Tags</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let doc of page.content">
          <td><strong>{{ doc.title }}</strong></td>
          <td>{{ doc.description }}</td>

          <td>
            <span class="badge"
              [ngClass]="{
                'bg-secondary': doc.status === 'DRAFT',
                'bg-success': doc.status === 'PUBLISHED',
                'bg-warning text-dark': doc.status === 'ARCHIVED'
              }">
              {{ doc.status }}
            </span>
          </td>

          <td>
            <span *ngFor="let tag of doc.tags" class="badge bg-info text-dark me-1">
              {{ tag }}
            </span>
          </td>
        </tr>
      </tbody>

    </table>

    <!-- PAGINAÇÃO -->
    <div class="d-flex justify-content-between align-items-center mt-3">

      <button
        class="btn btn-outline-primary"
        (click)="prevPage()"
        [disabled]="page.number === 0">
        ← Anterior
      </button>

      <span>
        Página {{ page.number + 1 }} de {{ page.totalPages }}
      </span>

      <button
        class="btn btn-outline-primary"
        (click)="nextPage()"
        [disabled]="page.number + 1 >= page.totalPages">
        Próxima →
      </button>

    </div>

    <!-- Vazio -->
    <div *ngIf="page.content.length === 0" class="mt-3">
      Nenhum documento encontrado
    </div>

  </ng-container>

</div>
