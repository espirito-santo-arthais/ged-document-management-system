<div class="container mt-5">
  <h2>Documentos</h2>

  <button class="btn btn-danger mb-3" (click)="logout()">
    Sair
  </button>

  <ng-container *ngIf="documentsPage$ | async as page">
    <p>Total: {{ page.content.length }}</p>

    <ul class="list-group" *ngIf="page.content.length > 0">
      <li *ngFor="let doc of page.content" class="list-group-item">
        <strong>{{ doc.title }}</strong> - {{ doc.description }}
      </li>
    </ul>

    <div *ngIf="page.content.length === 0" class="mt-3">
      Nenhum documento encontrado
    </div>
  </ng-container>
</div>
