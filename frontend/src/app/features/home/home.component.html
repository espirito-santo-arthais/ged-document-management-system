<div class="container m-5">

  <h2>Documentos</h2>

  <button class="btn btn-danger mb-3" (click)="logout()">
    Sair
  </button>

  <ng-container *ngIf="documentsPage$ | async as page">

    <p>Total: {{ page.totalElements }}</p>

    <!-- FILTROS -->
    <div class="card p-3 mb-3">

      <div class="row g-2">

        <!-- TÍTULO + TIPO -->
        <div class="col-md-4">
          <input class="form-control mb-2" placeholder="Buscar por título..." [(ngModel)]="filters.title"
            (keyup.enter)="applyFilters()" />

          <select class="form-select" [(ngModel)]="filters.searchType">
            <option value="CONTAINS">Contém</option>
            <option value="STARTS_WITH">Começa com</option>
          </select>
        </div>

        <!-- STATUS -->
        <div class="col-md-2">
          <select class="form-select" [(ngModel)]="filters.status">
            <option value="">Status</option>
            <option value="DRAFT">Draft</option>
            <option value="PUBLISHED">Publicado</option>
            <option value="ARCHIVED">Arquivado</option>
          </select>
        </div>

        <!-- OWNER -->
        <div class="col-md-2">
          <input class="form-control" placeholder="Owner" [(ngModel)]="filters.owner" />
        </div>

        <!-- BOTÃO -->
        <div class="col-md-2 d-grid">
          <button class="btn btn-primary" (click)="applyFilters()">
            Filtrar
          </button>
        </div>

      </div>

      <!-- DATAS -->
      <div class="row g-2 mt-2">

        <div class="col-md-3">
          <label>Criação de</label>
          <input type="datetime-local" class="form-control" [(ngModel)]="filters.createdAfter" />
        </div>

        <div class="col-md-3">
          <label>Criação até</label>
          <input type="datetime-local" class="form-control" [(ngModel)]="filters.createdBefore" />
        </div>

        <div class="col-md-3">
          <label>Atualização de</label>
          <input type="datetime-local" class="form-control" [(ngModel)]="filters.updatedAfter" />
        </div>

        <div class="col-md-3">
          <label>Atualização até</label>
          <input type="datetime-local" class="form-control" [(ngModel)]="filters.updatedBefore" />
        </div>

      </div>

      <!-- TAGS -->
      <div class="mt-3">

        <div class="input-group">
          <input class="form-control" placeholder="Adicionar tag" [(ngModel)]="tagInput" (keyup.enter)="addTag()" />

          <button class="btn btn-outline-primary" (click)="addTag()">+</button>
        </div>

        <div class="mt-2">
          <span *ngFor="let tag of filters.tags" class="badge bg-info me-2">
            {{ tag }}
            <span style="cursor:pointer;" (click)="removeTag(tag)">✖</span>
          </span>
        </div>

      </div>

    </div>

    <!-- TABELA -->
    <table class="table table-striped table-hover" *ngIf="page.content.length > 0">

      <thead class="table-dark">
        <tr>
          <th>Título</th>
          <th>Descrição</th>
          <th>Status</th>
          <th>Tags</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let doc of page.content">
          <td><strong>{{ doc.title }}</strong></td>
          <td>{{ doc.description }}</td>

          <td>
            <span class="badge" [ngClass]="{
                'bg-secondary': doc.status === 'DRAFT',
                'bg-success': doc.status === 'PUBLISHED',
                'bg-warning text-dark': doc.status === 'ARCHIVED'
              }">
              {{ doc.status }}
            </span>
          </td>

          <td>
            <span *ngFor="let tag of doc.tags || []" class="badge bg-info text-dark me-1">
              {{ tag }}
            </span>
          </td>
        </tr>
      </tbody>

    </table>

    <!-- PAGINAÇÃO -->
    <div class="d-flex justify-content-between align-items-center mt-3">

      <button class="btn btn-outline-primary" (click)="prevPage(page)" [disabled]="page.number === 0">
        ← Anterior
      </button>

      <span>
        Página {{ page.number + 1 }} de {{ page.totalPages }}
      </span>

      <button class="btn btn-outline-primary" (click)="nextPage(page)" [disabled]="page.number + 1 >= page.totalPages">
        Próxima →
      </button>

      <div class="mt-2">
        <div class="d-flex align-items-center gap-2">

          <label class="mb-0">Ir para página:</label>

          <input type="number" min="1" class="form-control" style="width: 120px;" (change)="goToPage($event)" />

        </div>
      </div>
    </div>

    <!-- VAZIO -->
    <div *ngIf="page.content.length === 0" class="mt-3">
      Nenhum documento encontrado
    </div>

  </ng-container>

</div>
