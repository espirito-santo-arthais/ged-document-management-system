name: CI

on:
  pull_request:
    branches: [ "master" ]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/**"
  push:
    branches: [ "master" ]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE" "$HEAD" || true)"

          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -E '^(backend/|\.github/workflows/)'; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -E '^(frontend/|\.github/workflows/)'; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

  # =========================
  # BACKEND
  # =========================
  backend:
    name: Backend - Build & Test
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ged_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d ged_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    env:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: ged_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: super-secret-key-super-secret-key-123456
      JWT_EXPIRATION: 3600000
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
      MINIO_BUCKET: documents
      MINIO_REGION: us-east-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 with Maven cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres -d ged_db && exit 0
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          exit 1

      - name: Build and test backend
        run: mvn -B clean verify

  # =========================
  # FRONTEND
  # =========================
  frontend:
    name: Frontend - Build
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node with cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Angular
        run: npm run build -- --configuration production